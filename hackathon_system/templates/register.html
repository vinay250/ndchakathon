{% extends "base.html" %}

{% block title %}Register Team – NDC CodeCraft 2026{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card shadow-lg border-0 mt-5">
      <div class="card-header bg-success text-white text-center py-4">
        <h3 class="mb-0"><i class="bi bi-people me-2"></i>Create New Team</h3>
      </div>
      <div class="card-body p-4 p-md-5">
        <form method="POST" action="">
          <div class="mb-4">
            <label class="form-label fw-semibold">Team Name (unique & cool!)</label>
            <input type="text" name="team_name" class="form-control form-control-lg" placeholder="SyntaxSlayers / BugBlasters" required>
            <div class="form-text text-muted mt-1">This will be shown on the leaderboard</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Username / Login ID</label>
            <input type="text" name="username" class="form-control form-control-lg" placeholder="teamalpha123" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control form-control-lg" required>
          </div>

          <button type="submit" class="btn btn-success btn-lg w-100">
            <i class="bi bi-person-plus me-2"></i> Register Team
          </button>
        </form>

        <div class="text-center mt-4">
          <a href="{{ url_for('login') }}" class="text-info">Already have a team? Login here</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
