{% extends "base.html" %}

{% block title %}Login – NDC CodeCraft 2026{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="card shadow-lg border-0 mt-5">
      <div class="card-header bg-primary text-white text-center py-4">
        <h3 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i>Team Login</h3>
      </div>
      <div class="card-body p-4 p-md-5">
        <form method="POST" action="">
          <div class="mb-4">
            <label class="form-label fw-semibold">Username / Team ID</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" placeholder="teamalpha / virat" required autofocus>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
            <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
          </button>

          <div class="text-center">
            <a href="{{ url_for('register') }}" class="text-info text-decoration-none">
              Don't have a team yet? Register now →
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
